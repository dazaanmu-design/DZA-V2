name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Detect Android project folder
        run: |
          echo "Repository files:"
          find . -maxdepth 3 -type f | sort
          if [ -f "settings.gradle" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          else
            FOUND_DIR=$(find . -mindepth 2 -maxdepth 2 -name settings.gradle -print -quit | xargs -r dirname)
            if [ -n "$FOUND_DIR" ]; then
              echo "PROJECT_DIR=${FOUND_DIR#./}" >> "$GITHUB_ENV"
            else
              echo "settings.gradle tidak ditemukan. Pastikan app/, build.gradle, dan settings.gradle ada di root repo atau di dalam 1 folder project."
              exit 1
            fi
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: gradle :app:assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          cp "${PROJECT_DIR}/app/build/outputs/apk/debug/app-debug.apk" output/DZA.apk
          ls -lah output/DZA.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DZA-debug-apk
          path: output/DZA.apk
